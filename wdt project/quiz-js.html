<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebQuiz Arena — JavaScript Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg: #06080a;
            --bg2: #0c1014;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.07);
            --accent: #f7df1e;
            --accent-dark: #b5a200;
            --accent-soft: rgba(247, 223, 30, 0.12);
            --accent-glow: rgba(247, 223, 30, 0.3);
            --correct: #00d97e;
            --wrong: #ff4d6d;
            --text: #f0f0ff;
            --muted: rgba(240, 240, 255, 0.45);
            --radius: 16px;
        }

        [data-theme="light"] {
            --bg: #fffde8;
            --bg2: #fff9cc;
            --surface: rgba(247, 223, 30, 0.1);
            --border: rgba(181, 162, 0, 0.2);
            --text: #1a1800;
            --muted: rgba(26, 24, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(247, 223, 30, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 10% 80%, rgba(247, 223, 30, 0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        .navbar {
            background: rgba(6, 8, 10, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        [data-theme="light"] .navbar {
            background: rgba(255, 253, 232, 0.9);
        }

        .navbar-brand {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            letter-spacing: 0.05em;
            color: #e8ff00 !important;
            text-decoration: none;
        }

        .navbar-brand span {
            color: var(--text);
        }

        .nav-link {
            color: var(--muted) !important;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.4rem 0.8rem !important;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--text) !important;
        }

        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 0.4rem 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .quiz-wrapper {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem 1rem 4rem;
        }

        .quiz-header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .quiz-header::before {
            content: 'JS';
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Bebas Neue', cursive;
            font-size: 8rem;
            color: rgba(247, 223, 30, 0.06);
            letter-spacing: -0.05em;
            pointer-events: none;
        }

        .quiz-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--accent-soft);
            border: 1px solid rgba(247, 223, 30, 0.3);
            border-radius: 100px;
            padding: 0.3rem 0.9rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
        }

        .quiz-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.5rem;
            letter-spacing: 0.03em;
            margin-bottom: 0.3rem;
        }

        .quiz-sub {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .quiz-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .timer-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            color: var(--accent);
            letter-spacing: 0.05em;
            min-width: 90px;
        }

        .timer-display.warning {
            color: #ffa500;
            animation: timerPulse 0.5s ease-in-out infinite alternate;
        }

        .timer-display.danger {
            color: var(--wrong);
            animation: timerPulse 0.3s ease-in-out infinite alternate;
        }

        @keyframes timerPulse {
            from {
                opacity: 1;
            }

            to {
                opacity: 0.6;
            }
        }

        .progress-info {
            flex: 1;
        }

        .progress-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .progress-bar-wrap {
            height: 6px;
            background: var(--border);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-dark), var(--accent));
            border-radius: 100px;
            transition: width 0.5s ease;
        }

        .score-display {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.4rem;
            color: var(--correct);
            letter-spacing: 0.05em;
            text-align: center;
        }

        .score-lbl {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .q-counter {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.4rem;
            color: var(--text);
            letter-spacing: 0.05em;
            text-align: center;
        }

        .q-counter-lbl {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .question-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            margin-bottom: 1.5rem;
            animation: questionIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes questionIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .q-number {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.8rem;
        }

        .q-text {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .q-code {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.2rem;
            font-family: 'Courier New', monospace;
            font-size: 0.88rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
            color: #e8e8f0;
            border-left: 3px solid var(--accent);
        }

        .q-code .kw {
            color: #f7df1e;
            font-weight: bold;
        }

        .q-code .fn {
            color: #00d97e;
        }

        .q-code .str {
            color: #ff6b35;
        }

        .q-code .cm {
            color: #555;
        }

        .q-code .num {
            color: #6488ff;
        }

        .q-code .op {
            color: #aaa;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .option-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1rem 1.2rem;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.92rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            position: relative;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        .option-btn .opt-text {
            font-family: 'Outfit', sans-serif;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--text);
            transform: translateY(-2px);
        }

        .option-letter {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: var(--accent-soft);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem;
            flex-shrink: 0;
            transition: all 0.25s;
            font-family: 'Outfit', sans-serif;
        }

        .option-btn:hover .option-letter {
            background: var(--accent);
            color: #000;
        }

        .option-btn.correct {
            background: rgba(0, 217, 126, 0.12);
            border-color: var(--correct);
            animation: correctPop 0.4s ease;
        }

        .option-btn.correct .option-letter {
            background: var(--correct);
            color: #000;
        }

        .option-btn.wrong {
            background: rgba(255, 77, 109, 0.12);
            border-color: var(--wrong);
            animation: wrongShake 0.4s ease;
        }

        .option-btn.wrong .option-letter {
            background: var(--wrong);
            color: #fff;
        }

        @keyframes correctPop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.03);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongShake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        .option-btn:disabled {
            cursor: default;
            transform: none !important;
        }

        .feedback-box {
            border-radius: 14px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 0.8rem;
            align-items: flex-start;
            animation: feedbackIn 0.4s ease;
        }

        @keyframes feedbackIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback-box.correct-fb {
            background: rgba(0, 217, 126, 0.1);
            border: 1px solid rgba(0, 217, 126, 0.3);
        }

        .feedback-box.wrong-fb {
            background: rgba(255, 77, 109, 0.1);
            border: 1px solid rgba(255, 77, 109, 0.3);
        }

        .fb-icon {
            font-size: 1.3rem;
            margin-top: 1px;
        }

        .fb-title {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
        }

        .fb-explain {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .correct-fb .fb-title {
            color: var(--correct);
        }

        .wrong-fb .fb-title {
            color: var(--wrong);
        }

        .btn-next {
            background: var(--accent);
            color: #000;
            font-weight: 700;
            padding: 0.9rem 2.5rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
            box-shadow: 0 4px 20px var(--accent-glow);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .btn-next:disabled {
            opacity: 0.4;
            cursor: default;
            transform: none;
        }

        .results-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            animation: questionIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .results-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }

        .results-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 3rem;
            letter-spacing: 0.03em;
            margin-bottom: 0.5rem;
        }

        .results-sub {
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: conic-gradient(var(--accent) calc(var(--pct)*3.6deg), var(--border) 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            position: relative;
        }

        .score-circle::before {
            content: '';
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: var(--bg2);
        }

        .score-inner {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .score-pct {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.2rem;
            color: var(--accent);
            line-height: 1;
        }

        .score-frac {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .results-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .r-stat {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
        }

        .r-stat-num {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            color: var(--accent);
        }

        .r-stat-lbl {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .results-btns {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .footer {
            background: var(--bg2);
            border-top: 1px solid var(--border);
            padding: 2rem 0;
            position: relative;
            z-index: 1;
        }

        .footer-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer-brand {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.3rem;
            color: #e8ff00;
        }

        .footer-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .footer-link:hover {
            color: var(--accent);
        }

        @media(max-width:600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }

            .results-stats {
                grid-template-columns: 1fr 1fr;
            }

            .quiz-controls {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

    <script>
        function toggleTheme() { const h = document.documentElement, isDark = h.getAttribute('data-theme') === 'dark'; h.setAttribute('data-theme', isDark ? 'light' : 'dark'); document.getElementById('themeIcon').className = isDark ? 'bi bi-moon-fill' : 'bi bi-sun-fill'; }

        const questions = [
            { q: "What will this code output?", code: `<span class="kw">console</span>.<span class="fn">log</span>(<span class="kw">typeof</span> <span class="kw">null</span>);`, opts: ["null", "undefined", "object", "boolean"], correct: 2, explain: "typeof null returns 'object' — a well-known JavaScript bug from 1995 that was kept for backwards compatibility. null is not actually an object." },
            { q: "What is the output of this arrow function?", code: `<span class="kw">const</span> <span class="fn">add</span> = (a, b) => a + b;\n<span class="kw">console</span>.<span class="fn">log</span>(<span class="fn">add</span>(<span class="num">3</span>, <span class="str">'4'</span>));`, opts: ["7", "34", "NaN", "TypeError"], correct: 1, explain: "When + is used with a number and string, JavaScript coerces the number to a string and concatenates. 3 + '4' = '34', not 7." },
            { q: "What does 'let' vs 'var' difference with block scope?", code: `{\n  <span class="kw">let</span> x = <span class="num">10</span>;\n  <span class="kw">var</span> y = <span class="num">20</span>;\n}\n<span class="kw">console</span>.<span class="fn">log</span>(<span class="kw">typeof</span> x, <span class="kw">typeof</span> y);`, opts: ["10 20", "undefined number", "number 20", "ReferenceError"], correct: 1, explain: "'let' is block-scoped — x is not accessible outside the block, so typeof x = 'undefined'. 'var' is function-scoped — y is accessible, so typeof y = 'number'." },
            { q: "What is a closure in JavaScript?", code: null, opts: ["A way to close browser windows", "A function that retains access to its outer scope even after the outer function returns", "A method to end loops early", "A type of error handling mechanism"], correct: 1, explain: "A closure is when a function 'closes over' variables from its outer scope. The inner function maintains access to these variables even after the outer function has returned." },
            { q: "What will this Promise code output?", code: `<span class="kw">console</span>.<span class="fn">log</span>(<span class="str">'A'</span>);\n<span class="kw">setTimeout</span>(() => <span class="kw">console</span>.<span class="fn">log</span>(<span class="str">'B'</span>), <span class="num">0</span>);\n<span class="kw">console</span>.<span class="fn">log</span>(<span class="str">'C'</span>);`, opts: ["A B C", "A C B", "B A C", "C A B"], correct: 1, explain: "JavaScript is single-threaded. 'A' logs first (sync), setTimeout goes to the task queue (even with 0ms delay), 'C' logs (sync), then 'B' logs from the queue. Output: A C B." },
            { q: "What does Array.prototype.map() return?", code: `<span class="kw">const</span> nums = [<span class="num">1</span>, <span class="num">2</span>, <span class="num">3</span>];\n<span class="kw">const</span> result = nums.<span class="fn">map</span>(n => n * <span class="num">2</span>);\n<span class="kw">console</span>.<span class="fn">log</span>(result);`, opts: ["Mutates original array to [2,4,6]", "undefined", "A new array [2,4,6]", "[1,2,3]"], correct: 2, explain: "map() returns a NEW array with transformed elements. It does NOT mutate the original array. The original nums array remains [1,2,3]." },
            { q: "What is the output of this destructuring?", code: `<span class="kw">const</span> [a, , b] = [<span class="num">10</span>, <span class="num">20</span>, <span class="num">30</span>];\n<span class="kw">console</span>.<span class="fn">log</span>(a, b);`, opts: ["10 20", "10 30", "undefined 30", "20 30"], correct: 1, explain: "Array destructuring with a skip: a=10 (first), the second element is skipped (empty slot), b=30 (third). Output: 10 30." },
            { q: "What does the spread operator do here?", code: `<span class="kw">const</span> arr1 = [<span class="num">1</span>, <span class="num">2</span>];\n<span class="kw">const</span> arr2 = [<span class="num">3</span>, <span class="num">4</span>];\n<span class="kw">const</span> combined = [...arr1, ...arr2];\n<span class="kw">console</span>.<span class="fn">log</span>(combined);`, opts: ["[[1,2],[3,4]]", "[1,2,3,4]", "[3,4,1,2]", "Error"], correct: 1, explain: "The spread operator (...) expands an iterable into individual elements. Combining two spreads creates a new flattened array: [1,2,3,4]." },
            { q: "What is 'hoisting' in JavaScript?", code: null, opts: ["Lifting heavy DOM elements", "Moving variable/function declarations to the top of their scope during compilation", "Asynchronous loading of scripts", "Event bubbling up the DOM"], correct: 1, explain: "Hoisting moves declarations (not initializations) to the top of their scope. Functions are fully hoisted; 'var' variables are hoisted as undefined; 'let'/'const' are in a temporal dead zone." },
            { q: "What will this async/await code return?", code: `<span class="kw">async function</span> <span class="fn">getData</span>() {\n  <span class="kw">return</span> <span class="num">42</span>;\n}\n<span class="kw">console</span>.<span class="fn">log</span>(<span class="fn">getData</span>());`, opts: ["42", "undefined", "NaN", "Promise {42}"], correct: 3, explain: "async functions ALWAYS return a Promise. Even though we return 42, it's wrapped as Promise {<fulfilled>: 42}. Use await or .then() to get the value 42." },
            { q: "What does 'use strict' mode do?", code: null, opts: ["Makes all variables global", "Enables TypeScript features", "Enforces stricter parsing, prevents undeclared variables and other errors", "Makes code run faster"], correct: 2, explain: "'use strict' enables strict mode: prevents undeclared variables, disallows duplicate parameters, catches silent errors, and is automatically enabled in ES6 modules and classes." },
            { q: "What is the output of this code?", code: `<span class="kw">const</span> obj = { a: <span class="num">1</span> };\n<span class="kw">const</span> copy = obj;\ncopy.a = <span class="num">99</span>;\n<span class="kw">console</span>.<span class="fn">log</span>(obj.a);`, opts: ["1", "99", "undefined", "ReferenceError"], correct: 1, explain: "Objects in JavaScript are reference types. 'copy = obj' copies the reference, not the value. Both variables point to the same object in memory, so changing copy.a changes obj.a too." },
            { q: "Which method removes and returns the last element of an array?", code: null, opts: ["array.shift()", "array.pop()", "array.splice(-1)", "array.remove()"], correct: 1, explain: "pop() removes and returns the last element. shift() removes the first element. splice() can remove from any position but with different syntax." },
            { q: "What does '===' vs '==' check?", code: `<span class="kw">console</span>.<span class="fn">log</span>(<span class="num">0</span> == <span class="str">'0'</span>);   <span class="cm">// ?</span>\n<span class="kw">console</span>.<span class="fn">log</span>(<span class="num">0</span> === <span class="str">'0'</span>);  <span class="cm">// ?</span>`, opts: ["true / true", "true / false", "false / true", "false / false"], correct: 1, explain: "== does type coercion (0 == '0' is true). === checks both value AND type (0 === '0' is false — number vs string). Always use === for predictable comparisons." },
            { q: "What is the Event Loop in JavaScript?", code: null, opts: ["A for loop for DOM events", "A mechanism that allows JS to perform non-blocking operations despite being single-threaded", "A CSS animation controller", "A browser API for timers"], correct: 1, explain: "The Event Loop monitors the Call Stack and Callback Queue. When the stack is empty, it moves callbacks (from setTimeout, Promises, etc.) to the stack for execution, enabling async behavior." },
            { q: "What does Object.freeze() do?", code: `<span class="kw">const</span> config = Object.<span class="fn">freeze</span>({ debug: <span class="kw">true</span> });\nconfig.debug = <span class="kw">false</span>;\n<span class="kw">console</span>.<span class="fn">log</span>(config.debug);`, opts: ["false", "undefined", "true (silently fails)", "TypeError thrown"], correct: 2, explain: "Object.freeze() makes an object immutable. Attempts to modify frozen objects fail silently in non-strict mode. The value stays true." },
            { q: "What is the output of this template literal?", code: `<span class="kw">const</span> name = <span class="str">'Arena'</span>;\n<span class="kw">const</span> score = <span class="num">95</span>;\n<span class="kw">console</span>.<span class="fn">log</span>(<span class="str">\`${name}: ${score >= 90 ? 'A' : 'B'}\`</span>);`, opts: ["name: score", "Arena: 95", "Arena: A", "${name}: ${score >= 90 ? 'A' : 'B'}"], correct: 2, explain: "Template literals allow expressions inside ${}. The ternary 95 >= 90 is true, returning 'A'. Output: 'Arena: A'." },
            { q: "What does Array.prototype.reduce() do?", code: `<span class="kw">const</span> sum = [<span class="num">1</span>,<span class="num">2</span>,<span class="num">3</span>,<span class="num">4</span>].<span class="fn">reduce</span>((acc, cur) => acc + cur, <span class="num">0</span>);\n<span class="kw">console</span>.<span class="fn">log</span>(sum);`, opts: ["[1,2,3,4]", "[0,1,2,3]", "10", "undefined"], correct: 2, explain: "reduce() applies a function against an accumulator for each element. Starting with 0: 0+1=1, 1+2=3, 3+3=6, 6+4=10. Final result: 10." },
            { q: "What is a Promise in JavaScript?", code: null, opts: ["A guarantee that code runs synchronously", "An object representing eventual completion or failure of an async operation", "A type of callback function", "A way to declare variables"], correct: 1, explain: "A Promise represents the eventual result of an asynchronous operation. It can be pending, fulfilled, or rejected. Promises enable cleaner async code than nested callbacks." },
            { q: "What does the 'this' keyword refer to in an arrow function?", code: `<span class="kw">const</span> obj = {\n  name: <span class="str">'Quiz'</span>,\n  <span class="fn">greet</span>: <span class="kw">function</span>() {\n    <span class="kw">const</span> arrow = () => <span class="kw">this</span>.name;\n    <span class="kw">return</span> <span class="fn">arrow</span>();\n  }\n};`, opts: ["undefined", "The arrow function itself", "The window/global object", "The enclosing function's 'this' (obj)"], correct: 3, explain: "Arrow functions don't have their own 'this'. They inherit 'this' from their lexical (enclosing) scope. Here, this refers to obj, so this.name = 'Quiz'." }
        ];

        let currentQ = 0, score = 0, answered = false, timeLeft = 600, timerInterval = null, userAnswers = [];

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                const disp = document.getElementById('timerDisplay');
                document.getElementById('timerText').textContent = `${m}:${s.toString().padStart(2, '0')}`;
                if (timeLeft <= 60) disp.className = 'timer-display danger';
                else if (timeLeft <= 120) disp.className = 'timer-display warning';
                if (timeLeft <= 0) { clearInterval(timerInterval); showResults(); }
            }, 1000);
        }

        function renderQuestion() {
            const q = questions[currentQ]; answered = false;
            const letters = ['A', 'B', 'C', 'D'];
            const codeBlock = q.code ? `<div class="q-code">${q.code}</div>` : '';
            document.getElementById('quizArea').innerHTML = `
    <div class="question-card">
      <div class="q-number">Question ${currentQ + 1} of ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      ${codeBlock}
      <div class="options-grid" id="optionsGrid">
        ${q.opts.map((opt, i) => `<button class="option-btn" onclick="selectAnswer(${i})" data-index="${i}"><span class="option-letter">${letters[i]}</span><span class="opt-text">${opt}</span></button>`).join('')}
      </div>
    </div>
    <div id="feedbackArea"></div>
    <div class="d-flex justify-content-end">
      <button class="btn-next" id="nextBtn" onclick="nextQuestion()" disabled>
        ${currentQ === questions.length - 1 ? 'See Results' : 'Next Question'} <i class="bi bi-arrow-right"></i>
      </button>
    </div>`;
            document.getElementById('progressLabel').textContent = `${currentQ} of ${questions.length}`;
            document.getElementById('progressBar').style.width = `${(currentQ / questions.length) * 100}%`;
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('qCounter').textContent = `${currentQ + 1}/${questions.length}`;
        }

        function selectAnswer(idx) {
            if (answered) return; answered = true;
            const q = questions[currentQ];
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.disabled = true);
            const isCorrect = idx === q.correct;
            btns[idx].classList.add(isCorrect ? 'correct' : 'wrong');
            if (!isCorrect) btns[q.correct].classList.add('correct');
            if (isCorrect) score++;
            userAnswers.push({ q: q.q, chosen: idx, correct: q.correct, isCorrect });
            document.getElementById('feedbackArea').innerHTML = `
    <div class="feedback-box ${isCorrect ? 'correct-fb' : 'wrong-fb'}">
      <div class="fb-icon">${isCorrect ? '✅' : '❌'}</div>
      <div><div class="fb-title">${isCorrect ? 'Correct! You know your JS!' : 'Not quite!'}</div><div class="fb-explain">${q.explain}</div></div>
    </div>`;
            document.getElementById('nextBtn').disabled = false;
            document.getElementById('scoreDisplay').textContent = score;
        }

        function nextQuestion() {
            if (currentQ < questions.length - 1) { currentQ++; renderQuestion(); }
            else { clearInterval(timerInterval); showResults(); }
        }

        function showResults() {
            const pct = Math.round((score / questions.length) * 100);
            let emoji = '😔', grade = 'Keep Coding!';
            if (pct >= 90) { emoji = '⚡'; grade = 'JS Master!'; } else if (pct >= 75) { emoji = '🏆'; grade = 'Sharp Mind!'; } else if (pct >= 60) { emoji = '👍'; grade = 'Good Work!'; }
            const timeTaken = 600 - timeLeft, m = Math.floor(timeTaken / 60), s = timeTaken % 60;
            document.getElementById('quizControls').style.display = 'none';
            document.getElementById('quizArea').innerHTML = `
    <div class="results-card">
      <span class="results-emoji">${emoji}</span>
      <div class="results-title">${grade}</div>
      <div class="results-sub">JavaScript Quiz Complete!</div>
      <div class="score-circle" style="--pct:${pct}">
        <div class="score-inner"><div class="score-pct">${pct}%</div><div class="score-frac">${score}/${questions.length}</div></div>
      </div>
      <div class="results-stats">
        <div class="r-stat"><div class="r-stat-num" style="color:var(--correct)">${score}</div><div class="r-stat-lbl">Correct</div></div>
        <div class="r-stat"><div class="r-stat-num" style="color:var(--wrong)">${questions.length - score}</div><div class="r-stat-lbl">Wrong</div></div>
        <div class="r-stat"><div class="r-stat-num">${m}:${s.toString().padStart(2, '0')}</div><div class="r-stat-lbl">Time</div></div>
      </div>
      <div class="results-btns">
        <button class="btn-next" onclick="restartQuiz()" style="background:var(--surface);color:var(--text);border:1px solid var(--border);box-shadow:none;"><i class="bi bi-arrow-clockwise"></i> Try Again</button>
        <button class="btn-next" onclick="location.href='quiz-html.html'" style="background:var(--surface);color:var(--text);border:1px solid var(--border);box-shadow:none;">HTML Quiz</button>
        <button class="btn-next" onclick="location.href='user-portal.html'">My Portal <i class="bi bi-person-circle ms-1"></i></button>
      </div>
    </div>`;
            const history = JSON.parse(localStorage.getItem('quizHistory') || '[]');
            history.push({ type: 'JavaScript', score, total: questions.length, pct, date: new Date().toLocaleDateString() });
            localStorage.setItem('quizHistory', JSON.stringify(history));
        }

        function restartQuiz() {
            currentQ = 0; score = 0; answered = false; timeLeft = 600; userAnswers = [];
            clearInterval(timerInterval);
            document.getElementById('quizControls').style.display = '';
            document.getElementById('timerDisplay').className = 'timer-display';
            renderQuestion(); startTimer();
        }

        renderQuestion(); startTimer();
    </script>
</body>

</html>
