<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebQuiz Arena — HTML Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg: #060612;
            --bg2: #0d0d22;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.07);
            --accent: #ff6b35;
            --accent-soft: rgba(255, 107, 53, 0.15);
            --accent-glow: rgba(255, 107, 53, 0.3);
            --correct: #00d97e;
            --wrong: #ff4d6d;
            --text: #f0f0ff;
            --muted: rgba(240, 240, 255, 0.45);
            --radius: 16px;
        }

        [data-theme="light"] {
            --bg: #fff8f5;
            --bg2: #fff0ea;
            --surface: rgba(255, 107, 53, 0.06);
            --border: rgba(255, 107, 53, 0.15);
            --text: #1a0a00;
            --muted: rgba(26, 10, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse 60% 50% at 20% 10%, rgba(255, 107, 53, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 80% 90%, rgba(255, 77, 109, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ─── NAVBAR ─── */
        .navbar {
            background: rgba(6, 6, 18, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        [data-theme="light"] .navbar {
            background: rgba(255, 248, 245, 0.9);
        }

        .navbar-brand {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            letter-spacing: 0.05em;
            color: var(--accent) !important;
            text-decoration: none;
        }

        .navbar-brand span {
            color: var(--text);
        }

        .nav-link {
            color: var(--muted) !important;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.4rem 0.8rem !important;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--text) !important;
        }

        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 0.4rem 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ─── QUIZ WRAPPER ─── */
        .quiz-wrapper {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem 1rem 4rem;
        }

        /* ─── HEADER ─── */
        .quiz-header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .quiz-header::before {
            content: '<HTML>';
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Bebas Neue', cursive;
            font-size: 6rem;
            color: rgba(255, 107, 53, 0.06);
            letter-spacing: -0.05em;
            pointer-events: none;
            white-space: nowrap;
        }

        .quiz-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--accent-soft);
            border: 1px solid rgba(255, 107, 53, 0.3);
            border-radius: 100px;
            padding: 0.3rem 0.9rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
        }

        .quiz-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.5rem;
            letter-spacing: 0.03em;
            margin-bottom: 0.3rem;
        }

        .quiz-sub {
            color: var(--muted);
            font-size: 0.9rem;
        }

        /* ─── PROGRESS + TIMER ROW ─── */
        .quiz-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .timer-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            color: var(--accent);
            letter-spacing: 0.05em;
            min-width: 90px;
        }

        .timer-display.warning {
            color: #ffd700;
            animation: timerPulse 0.5s ease-in-out infinite alternate;
        }

        .timer-display.danger {
            color: var(--wrong);
            animation: timerPulse 0.3s ease-in-out infinite alternate;
        }

        @keyframes timerPulse {
            from {
                opacity: 1;
            }

            to {
                opacity: 0.6;
            }
        }

        .timer-icon {
            font-size: 1.1rem;
        }

        .progress-info {
            flex: 1;
        }

        .progress-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .progress-bar-wrap {
            height: 6px;
            background: var(--border);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #ffaa00);
            border-radius: 100px;
            transition: width 0.5s ease;
        }

        .score-display {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.4rem;
            color: var(--correct);
            letter-spacing: 0.05em;
            text-align: center;
        }

        .score-lbl {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .q-counter {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.4rem;
            color: var(--text);
            letter-spacing: 0.05em;
            text-align: center;
        }

        .q-counter-lbl {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* ─── QUESTION CARD ─── */
        .question-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            margin-bottom: 1.5rem;
            animation: questionIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes questionIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .q-number {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.8rem;
        }

        .q-text {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .q-code {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.2rem;
            font-family: 'Courier New', monospace;
            font-size: 0.88rem;
            line-height: 1.7;
            margin-bottom: 1.5rem;
            color: #e8e8f0;
            border-left: 3px solid var(--accent);
        }

        .q-code .kw {
            color: #ff6b35;
        }

        .q-code .str {
            color: #00d97e;
        }

        .q-code .cm {
            color: #555;
        }

        .q-code .attr {
            color: #7b9fff;
        }

        /* ─── OPTIONS ─── */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .option-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1rem 1.2rem;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.92rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            position: relative;
            overflow: hidden;
        }

        .option-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--text);
            transform: translateY(-2px);
        }

        .option-btn:hover::before {
            opacity: 1;
        }

        .option-letter {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: var(--accent-soft);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem;
            flex-shrink: 0;
            transition: all 0.25s;
        }

        .option-btn:hover .option-letter {
            background: var(--accent);
            color: #000;
        }

        .option-btn.correct {
            background: rgba(0, 217, 126, 0.12);
            border-color: var(--correct);
            animation: correctPop 0.4s ease;
        }

        .option-btn.correct .option-letter {
            background: var(--correct);
            color: #000;
        }

        .option-btn.wrong {
            background: rgba(255, 77, 109, 0.12);
            border-color: var(--wrong);
            animation: wrongShake 0.4s ease;
        }

        .option-btn.wrong .option-letter {
            background: var(--wrong);
            color: #fff;
        }

        @keyframes correctPop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.03);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes wrongShake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        .option-btn:disabled {
            cursor: default;
            transform: none !important;
        }

        /* ─── FEEDBACK ─── */
        .feedback-box {
            border-radius: 14px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 0.8rem;
            align-items: flex-start;
            animation: feedbackIn 0.4s ease;
        }

        @keyframes feedbackIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback-box.correct-fb {
            background: rgba(0, 217, 126, 0.1);
            border: 1px solid rgba(0, 217, 126, 0.3);
        }

        .feedback-box.wrong-fb {
            background: rgba(255, 77, 109, 0.1);
            border: 1px solid rgba(255, 77, 109, 0.3);
        }

        .fb-icon {
            font-size: 1.3rem;
            margin-top: 1px;
        }

        .fb-title {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
        }

        .fb-explain {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .correct-fb .fb-title {
            color: var(--correct);
        }

        .wrong-fb .fb-title {
            color: var(--wrong);
        }

        /* ─── NEXT BTN ─── */
        .btn-next {
            background: var(--accent);
            color: #000;
            font-weight: 700;
            padding: 0.9rem 2.5rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
            box-shadow: 0 4px 20px var(--accent-glow);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .btn-next:disabled {
            opacity: 0.4;
            cursor: default;
            transform: none;
        }

        /* ─── RESULTS ─── */
        .results-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            animation: questionIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .results-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }

        .results-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 3rem;
            letter-spacing: 0.03em;
            margin-bottom: 0.5rem;
        }

        .results-sub {
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: conic-gradient(var(--accent) calc(var(--pct)*3.6deg), var(--border) 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            position: relative;
        }

        .score-circle::before {
            content: '';
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: var(--bg2);
        }

        .score-inner {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .score-pct {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.2rem;
            color: var(--accent);
            line-height: 1;
        }

        .score-frac {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .results-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .r-stat {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
        }

        .r-stat-num {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            color: var(--accent);
        }

        .r-stat-lbl {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .results-btns {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ─── FOOTER ─── */
        .footer {
            background: var(--bg2);
            border-top: 1px solid var(--border);
            padding: 2rem 0;
            position: relative;
            z-index: 1;
        }

        .footer-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer-brand {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.3rem;
            color: var(--accent);
        }

        .footer-links {
            display: flex;
            gap: 1.5rem;
        }

        .footer-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .footer-link:hover {
            color: var(--accent);
        }

        @media(max-width:600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }

            .results-stats {
                grid-template-columns: 1fr 1fr;
            }

            .quiz-controls {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

    <script>
        // ─── Theme ───
        function toggleTheme() {
            const h = document.documentElement, isDark = h.getAttribute('data-theme') === 'dark';
            h.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeIcon').className = isDark ? 'bi bi-moon-fill' : 'bi bi-sun-fill';
        }

        // ─── Questions ───
        const questions = [
            { q: "What does HTML stand for?", code: null, opts: ["Hyper Text Markup Language", "High Tech Modern Language", "Hyper Transfer Markup Language", "Home Tool Markup Language"], correct: 0, explain: "HTML stands for HyperText Markup Language — the standard language for creating web pages." },
            { q: "Which HTML tag is used to define the largest heading?", code: null, opts: ["<h6>", "<head>", "<h1>", "<header>"], correct: 2, explain: "<h1> defines the largest/most important heading. Headings go from <h1> (largest) to <h6> (smallest)." },
            { q: "What is the correct HTML element for inserting a line break?", code: null, opts: ["<break>", "<lb>", "<br>", "<newline>"], correct: 2, explain: "<br> is the self-closing tag used to insert a single line break in HTML." },
            { q: "What does the 'alt' attribute in an <img> tag provide?", code: `<img src="photo.jpg" alt="A sunset over mountains">`, opts: ["Image title on hover", "Alternative text for accessibility & SEO", "Image caption below", "File description metadata"], correct: 1, explain: "The 'alt' attribute provides alternative text if the image cannot be displayed and improves accessibility for screen readers." },
            { q: "Which HTML5 element defines navigation links?", code: null, opts: ["<navigation>", "<menu>", "<nav>", "<links>"], correct: 2, explain: "<nav> is the HTML5 semantic element specifically for defining sets of navigation links." },
            { q: "What is the output of this HTML structure?", code: `<span class="kw">&lt;!DOCTYPE html&gt;</span>\n<span class="attr">&lt;html lang=<span class="str">"en"</span>&gt;</span>\n  <span class="attr">&lt;head&gt;&lt;title&gt;</span>Test<span class="attr">&lt;/title&gt;&lt;/head&gt;</span>\n<span class="attr">&lt;body&gt;</span>Hello<span class="attr">&lt;/body&gt;</span>`, opts: ["Nothing — missing closing tags", "Syntax error in browser", "A valid HTML page showing 'Hello'", "Displays 'Test Hello'"], correct: 2, explain: "This is a valid minimal HTML5 document. The browser renders 'Hello' in the body. lang='en' is a best practice for accessibility." },
            { q: "Which attribute specifies where a form's data is sent?", code: `<span class="kw">&lt;form</span> <span class="attr">action</span>=<span class="str">"/submit"</span> <span class="attr">method</span>=<span class="str">"post"</span><span class="kw">&gt;</span>`, opts: ["method", "target", "action", "src"], correct: 2, explain: "The 'action' attribute specifies the URL where form data is sent when submitted. 'method' defines how it's sent (GET/POST)." },
            { q: "What is the purpose of the <meta charset='UTF-8'> tag?", code: null, opts: ["Sets font encoding", "Defines character encoding for the document", "Specifies browser compatibility", "Sets language direction"], correct: 1, explain: "<meta charset='UTF-8'> declares the character encoding, ensuring the browser correctly interprets and displays text from any language." },
            { q: "Which input type is used for password fields?", code: null, opts: ["type='hidden'", "type='secret'", "type='password'", "type='secure'"], correct: 2, explain: "type='password' masks the input characters, making it suitable for password entry fields." },
            { q: "What does the <figure> element represent?", code: null, opts: ["A shape in SVG", "Self-contained content like images with optional captions", "A full-page image", "An illustration only"], correct: 1, explain: "<figure> represents self-contained content (images, diagrams, code) that can be referenced from the main content, optionally with a <figcaption>." },
            { q: "Which HTML attribute is used to make an input field required?", code: `<span class="kw">&lt;input</span> <span class="attr">type</span>=<span class="str">"email"</span> <span class="attr">?????</span><span class="kw">&gt;</span>`, opts: ["mandatory", "validate", "required", "must-fill"], correct: 2, explain: "The 'required' attribute is a boolean attribute that prevents form submission if the field is empty." },
            { q: "What is the correct HTML for creating a hyperlink?", code: null, opts: ["<a url='...'>text</a>", "<a href='...'>text</a>", "<link href='...'>text</link>", "<hyperlink>text</hyperlink>"], correct: 1, explain: "<a href='URL'>text</a> creates a hyperlink. 'href' specifies the destination URL." },
            { q: "Which semantic HTML5 element is used for blog posts or articles?", code: null, opts: ["<section>", "<content>", "<post>", "<article>"], correct: 3, explain: "<article> is used for self-contained content like blog posts, news articles, or forum posts that can stand independently." },
            { q: "What does the 'defer' attribute do on a <script> tag?", code: `<span class="kw">&lt;script</span> <span class="attr">src</span>=<span class="str">"app.js"</span> <span class="attr">defer</span><span class="kw">&gt;&lt;/script&gt;</span>`, opts: ["Loads script asynchronously", "Delays script execution until HTML parsing is complete", "Prevents script from running", "Compresses the script"], correct: 1, explain: "'defer' delays script execution until the HTML document has been fully parsed, without blocking rendering. Scripts run in order." },
            { q: "Which HTML element defines a table row?", code: null, opts: ["<td>", "<th>", "<tr>", "<row>"], correct: 2, explain: "<tr> defines a table row. <td> defines table data cells, and <th> defines header cells within a row." },
            { q: "What is the correct way to embed a CSS file in HTML?", code: null, opts: ["<style src='style.css'>", "<script href='style.css'>", "<link rel='stylesheet' href='style.css'>", "<css href='style.css'>"], correct: 2, explain: "<link rel='stylesheet' href='style.css'> is the standard way to link an external CSS file. It goes inside the <head> element." },
            { q: "What does the 'data-*' attribute do in HTML5?", code: `<span class="kw">&lt;div</span> <span class="attr">data-user-id</span>=<span class="str">"42"</span> <span class="attr">data-role</span>=<span class="str">"admin"</span><span class="kw">&gt;</span>`, opts: ["Stores database connection info", "Stores private custom data for scripts", "Creates CSS variables", "Defines API endpoints"], correct: 1, explain: "data-* attributes store custom data private to the page or application. They can be accessed via JavaScript's dataset property." },
            { q: "Which element should wrap the main content unique to a page?", code: null, opts: ["<div id='main'>", "<content>", "<main>", "<body>"], correct: 2, explain: "<main> represents the dominant content of a document's <body>. It should be unique and not repeated across pages." },
            { q: "What is the purpose of the 'aria-label' attribute?", code: null, opts: ["Labels elements for CSS styling", "Provides accessible name for screen readers", "Sets browser tooltip", "Validates form fields"], correct: 1, explain: "aria-label provides a text alternative for interactive elements without visible labels, improving screen reader accessibility." },
            { q: "Which HTML5 element is used for time/dates?", code: `<span class="kw">&lt;?????</span> <span class="attr">datetime</span>=<span class="str">"2025-06-15"</span><span class="kw">&gt;</span>June 15<span class="kw">&lt;/?????&gt;</span>`, opts: ["<date>", "<clock>", "<time>", "<datetime>"], correct: 2, explain: "<time> represents a specific period in time. The optional 'datetime' attribute encodes the date in machine-readable format." }
        ];

        // ─── State ───
        let currentQ = 0, score = 0, answered = false;
        let timeLeft = 600, timerInterval = null;
        let userAnswers = [];

        // ─── Timer ───
        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                const disp = document.getElementById('timerDisplay');
                document.getElementById('timerText').textContent = `${m}:${s.toString().padStart(2, '0')}`;
                if (timeLeft <= 60) { disp.className = 'timer-display danger'; }
                else if (timeLeft <= 120) { disp.className = 'timer-display warning'; }
                if (timeLeft <= 0) { clearInterval(timerInterval); showResults(); }
            }, 1000);
        }

        // ─── Render Question ───
        function renderQuestion() {
            const q = questions[currentQ];
            answered = false;
            const area = document.getElementById('quizArea');
            const letters = ['A', 'B', 'C', 'D'];
            const codeBlock = q.code ? `<div class="q-code">${q.code}</div>` : '';
            area.innerHTML = `
    <div class="question-card">
      <div class="q-number">Question ${currentQ + 1} of ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      ${codeBlock}
      <div class="options-grid" id="optionsGrid">
        ${q.opts.map((opt, i) => `
          <button class="option-btn" onclick="selectAnswer(${i})" data-index="${i}">
            <span class="option-letter">${letters[i]}</span>
            <span>${opt}</span>
          </button>`).join('')}
      </div>
    </div>
    <div id="feedbackArea"></div>
    <div class="d-flex justify-content-end">
      <button class="btn-next" id="nextBtn" onclick="nextQuestion()" disabled>
        ${currentQ === questions.length - 1 ? 'See Results' : 'Next Question'} <i class="bi bi-arrow-right"></i>
      </button>
    </div>`;
            updateControls();
        }

        function updateControls() {
            document.getElementById('progressLabel').textContent = `${currentQ} of ${questions.length}`;
            document.getElementById('progressBar').style.width = `${(currentQ / questions.length) * 100}%`;
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('qCounter').textContent = `${currentQ + 1}/${questions.length}`;
        }

        function selectAnswer(idx) {
            if (answered) return;
            answered = true;
            const q = questions[currentQ];
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => { b.disabled = true; });
            const isCorrect = idx === q.correct;
            btns[idx].classList.add(isCorrect ? 'correct' : 'wrong');
            if (!isCorrect) btns[q.correct].classList.add('correct');
            if (isCorrect) score++;
            userAnswers.push({ q: q.q, chosen: idx, correct: q.correct, isCorrect });
            const fb = document.getElementById('feedbackArea');
            fb.innerHTML = `
    <div class="feedback-box ${isCorrect ? 'correct-fb' : 'wrong-fb'}">
      <div class="fb-icon">${isCorrect ? '✅' : '❌'}</div>
      <div>
        <div class="fb-title">${isCorrect ? 'Correct! Well done!' : 'Wrong answer!'}</div>
        <div class="fb-explain">${q.explain}</div>
      </div>
    </div>`;
            document.getElementById('nextBtn').disabled = false;
            document.getElementById('scoreDisplay').textContent = score;
        }

        function nextQuestion() {
            if (currentQ < questions.length - 1) { currentQ++; renderQuestion(); }
            else { clearInterval(timerInterval); showResults(); }
        }

        function showResults() {
            const pct = Math.round((score / questions.length) * 100);
            let emoji = '😔', grade = 'Keep Practicing!';
            if (pct >= 90) { emoji = '🏆'; grade = 'Outstanding!'; }
            else if (pct >= 75) { emoji = '🎉'; grade = 'Great Job!'; }
            else if (pct >= 60) { emoji = '👍'; grade = 'Good Effort!'; }
            const timeTaken = 600 - timeLeft;
            const m = Math.floor(timeTaken / 60), s = timeTaken % 60;
            document.getElementById('quizControls').style.display = 'none';
            document.getElementById('quizArea').innerHTML = `
    <div class="results-card">
      <span class="results-emoji">${emoji}</span>
      <div class="results-title">${grade}</div>
      <div class="results-sub">You've completed the HTML Quiz!</div>
      <div class="score-circle" style="--pct:${pct}">
        <div class="score-inner">
          <div class="score-pct">${pct}%</div>
          <div class="score-frac">${score}/${questions.length}</div>
        </div>
      </div>
      <div class="results-stats">
        <div class="r-stat"><div class="r-stat-num" style="color:var(--correct)">${score}</div><div class="r-stat-lbl">Correct</div></div>
        <div class="r-stat"><div class="r-stat-num" style="color:var(--wrong)">${questions.length - score}</div><div class="r-stat-lbl">Wrong</div></div>
        <div class="r-stat"><div class="r-stat-num" style="color:var(--accent)">${m}:${s.toString().padStart(2, '0')}</div><div class="r-stat-lbl">Time Taken</div></div>
      </div>
      <div class="results-btns">
        <button class="btn-next" onclick="restartQuiz()" style="background:var(--surface);color:var(--text);border:1px solid var(--border);box-shadow:none;">
          <i class="bi bi-arrow-clockwise"></i> Try Again
        </button>
        <button class="btn-next" onclick="location.href='quiz-css.html'">
          CSS Quiz <i class="bi bi-arrow-right"></i>
        </button>
        <button class="btn-next" onclick="location.href='home.html'" style="background:var(--surface);color:var(--text);border:1px solid var(--border);box-shadow:none;">
          <i class="bi bi-house"></i> Home
        </button>
      </div>
    </div>`;
            // Save to localStorage
            const history = JSON.parse(localStorage.getItem('quizHistory') || '[]');
            history.push({ type: 'HTML', score, total: questions.length, pct, date: new Date().toLocaleDateString() });
            localStorage.setItem('quizHistory', JSON.stringify(history));
        }

        function restartQuiz() {
            currentQ = 0; score = 0; answered = false; timeLeft = 600; userAnswers = [];
            clearInterval(timerInterval);
            document.getElementById('quizControls').style.display = '';
            document.getElementById('timerDisplay').className = 'timer-display';
            renderQuestion();
            startTimer();
        }

        // ─── Init ───
        renderQuestion();
        startTimer();
    </script>
</body>

</html>
